# Moss CI — capability regression test
#
# Lives in the Moss fork (1-ztc/moss). Gates PRs on Moss capability regression:
# a previously-passing capability test that now fails blocks merge.
#
# Required GitHub Secret: MOSS_API_KEY (the apiKey Moss uses for its model).
# Moss ignores env vars for model settings, so CI writes a temporary
# config.json from this secret at runtime. The file lives only on the
# one-shot runner. Never commit the key.

name: moss-ci capability regression

on:
  pull_request:
  push:
    branches:
      - main
      - '2026_*'   # dated working branches

jobs:
  capability:
    name: Moss capability tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Moss
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Moss
        run: npm ci && npm run build --workspace @rdk-moss/agent

      - name: Install moss-ci
        run: pip install "git+https://github.com/1-ztc/ci_test.git@feat/implementation"

      - name: Fetch moss-ci test suites
        # The pip-installed moss-ci package ships the CLI, not the example
        # suites (they live at the repo root, not inside the package). Pull
        # the examples directory from the same ref so the suite + fixture
        # files are available on the runner.
        run: |
          git clone --depth 1 --branch feat/implementation https://github.com/1-ztc/ci_test.git "$RUNNER_TEMP/moss-ci-repo"
          echo "SUITE_DIR=$RUNNER_TEMP/moss-ci-repo/examples" >> "$GITHUB_ENV"

      - name: Stage suite + fixtures into Moss checkout
        # moss_capabilities.yaml uses workdir: ./examples/fixtures, resolved
        # against the moss-ci cwd (the Moss checkout root). Copy examples/
        # there so the relative path finds the fixture file.
        run: cp -r "$SUITE_DIR" "$GITHUB_WORKSPACE/examples"

      - name: Write Moss model config from secret
        # Moss ignores env vars for model settings; it needs a config.json.
        # Write one from the MOSS_API_KEY secret. Use Python (not a shell
        # heredoc or printf) so the key can't be mangled by shell quoting and
        # the JSON is guaranteed valid. The file lives only on the runner.
        env:
          MOSS_API_KEY: ${{ secrets.MOSS_API_KEY }}
        run: |
          python - <<'PY'
          import json, os
          cfg = {
              "provider": "openai_compatible",
              "model": "deepseek-v4-pro",
              "baseUrl": "https://ai-api.d-robotics.cc",
              "apiKey": os.environ["MOSS_API_KEY"],
          }
          os.makedirs("/tmp/moss-ci", exist_ok=True)
          with open("/tmp/moss-ci/config.json", "w") as f:
              json.dump(cfg, f, indent=2)
          assert cfg["apiKey"], "MOSS_API_KEY secret is empty or missing"
          print("config.json written (key redacted in logs)")
          PY

      - name: Run capability suite
        env:
          PYTHONUTF8: '1'
          MOSS_CLI_COMMAND: 'node ${{ github.workspace }}/packages/moss-agent/dist/cli.js --config-file /tmp/moss-ci/config.json'
        run: moss-ci run "$SUITE_DIR/moss_capabilities.yaml" --no-fail-fast

      # NOTE: pass/fail gating only. Cross-run regression DIFF (new_failure /
      # fixed) needs a shared result store across runners — a follow-up.
